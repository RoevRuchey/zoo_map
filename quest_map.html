<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта квестов – зоопарк</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; z-index: 1; }
        .controls {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 2;
        }
        .info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            color: #1e466e;
        }
        .filter-group {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group label {
            font-size: 14px;
            cursor: pointer;
        }
        .filter-group input[type="checkbox"] {
            margin-right: 4px;
        }
        .quest-marker div {
            font-size: 28px;
            text-shadow: 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff,
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6),
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6);
            cursor: default;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            line-height: 1;
        }
        .quest-marker {
            background: none !important;
            border: none !important;
        }
        .nav-link {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            font-size: 14px;
        }
        .nav-link:hover { background: #5a6268; }
        .hidden-link { display: none; }
    </style>
</head>
<body>
<div class="controls">
    <div class="info">📍 Квесты в зоопарке</div>
    <div class="filter-group">
        <label><input type="checkbox" id="filterHoliday" checked> 🎉 Праздничные</label>
        <label><input type="checkbox" id="filterByAppointment" checked> 📅 По записи</label>
    </div>
    <div class="info">🔄 Данные обновляются автоматически</div>
    <a href="index.html" class="nav-link">🐘 Карта зоопарка</a>
</div>
<div id="map"></div>

<script>
    // ========== НАСТРОЙКИ SUPABASE ==========
    const SUPABASE_URL = 'https://rxfgzsscjegyjfyiulti.supabase.co';   // ваш URL
    const SUPABASE_ANON_KEY = 'sb_publishable_-0o0yxmSQITeUmnSGu-n3g_mBh0sgyv'; // ваш ключ
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== КАРТА ==========
    const zooMapImageUrl = 'zoo_map.png';
    const imageBounds = [[56.00, 92.80], [56.04, 92.94]];
    const map = L.map('map', { zoomControl: true }).setView([56.02, 92.87], 15);
    map.setMinZoom(12);
    map.setMaxZoom(18);
    L.imageOverlay(zooMapImageUrl, imageBounds, { opacity: 1, interactive: false }).addTo(map);
    map.fitBounds(imageBounds);
    map.setMaxBounds(imageBounds);

    const markersMap = new Map();

    // Фильтры (по умолчанию включены)
    let filterHoliday = true;
    let filterByAppointment = true;

    // ========== ИКОНКИ ==========
    function getQuestIcon(type) {
        let emoji = type === 'holiday' ? '📌' : '📅';
        return L.divIcon({
            html: `<div>${emoji}</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'quest-marker'
        });
    }

    // ========== ПОПАП ==========
    function createQuestPopup(quest) {
        let html = `<div style="min-width:160px;">`;
        if (quest.location_name) html += `<strong>📍 ${escapeHtml(quest.location_name)}</strong><br>`;
        if (quest.name) {
            const typeLabel = quest.type === 'holiday' ? 'Праздничная программа' : 'Программа по записи';
            html += `<span>${escapeHtml(quest.name)} (${typeLabel})</span><br>`;
        }
        if (quest.description) html += `<span style="font-size:13px;color:#555;">📝 ${escapeHtml(quest.description)}</span>`;
        html += `</div>`;
        return html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== ОБНОВЛЕНИЕ МАРКЕРОВ ==========
    function updateOrCreateMarker(quest) {
        const { id, lat, lng } = quest;
        if (!id || lat === undefined || lng === undefined) return;
        const key = 'quest_' + id;

        const icon = getQuestIcon(quest.type);
        const popupContent = createQuestPopup(quest);

        if (markersMap.has(key)) {
            const marker = markersMap.get(key);
            marker.setLatLng([lat, lng]);
            marker.setPopupContent(popupContent);
            marker.setIcon(icon);
            return;
        }
        const marker = L.marker([lat, lng], { draggable: false, icon: icon }).addTo(map);
        marker.bindPopup(popupContent);
        marker.data = quest;
        markersMap.set(key, marker);
        applyFilters();
    }

    // ========== ФИЛЬТРЫ ==========
    function applyFilters() {
        markersMap.forEach((marker) => {
            const type = marker.data?.type;
            let visible = true;
            if (type === 'holiday') visible = filterHoliday;
            else if (type === 'by_appointment') visible = filterByAppointment;
            else visible = false;
            if (visible) {
                if (!map.hasLayer(marker)) marker.addTo(map);
            } else {
                if (map.hasLayer(marker)) map.removeLayer(marker);
            }
        });
    }

    document.getElementById('filterHoliday').addEventListener('change', function() {
        filterHoliday = this.checked;
        applyFilters();
    });
    document.getElementById('filterByAppointment').addEventListener('change', function() {
        filterByAppointment = this.checked;
        applyFilters();
    });

    // ========== ЗАГРУЗКА ДАННЫХ ==========
    async function loadInitialData() {
        const { data: quests, error } = await sb.from('quests').select('*');
        if (error) console.error('Ошибка загрузки квестов:', error);
        else quests.forEach(quest => updateOrCreateMarker(quest));
    }

    // ========== ПОДПИСКИ REALTIME ==========
    const channel = sb.channel('quests');
    channel.on(
        'postgres_changes',
        { event: '*', schema: 'public', table: 'quests' },
        (payload) => {
            if (payload.eventType === 'INSERT') {
                updateOrCreateMarker(payload.new);
            } else if (payload.eventType === 'UPDATE') {
                updateOrCreateMarker(payload.new);
            } else if (payload.eventType === 'DELETE') {
                const key = 'quest_' + payload.old.id;
                if (markersMap.has(key)) {
                    map.removeLayer(markersMap.get(key));
                    markersMap.delete(key);
                }
            }
        }
    ).subscribe();

    // Загружаем существующие данные
    loadInitialData();

    console.log("Карта квестов загружена.");
</script>
</body>
</html>
